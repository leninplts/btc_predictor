services:
  bot:
    build: .
    restart: unless-stopped
    network_mode: host
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ENABLE_DATA_COLLECTION: ${ENABLE_DATA_COLLECTION:-true}
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      POLY_PRIVATE_KEY: ${POLY_PRIVATE_KEY:-}
      POLY_FUNDER_ADDRESS: ${POLY_FUNDER_ADDRESS:-}
      BOT_INITIAL_CAPITAL: ${BOT_INITIAL_CAPITAL:-1000}
      BOT_MIN_CONFIDENCE: ${BOT_MIN_CONFIDENCE:-0.55}
      BOT_MAX_RISK: ${BOT_MAX_RISK:-0.05}
      BOT_KELLY_FRACTION: ${BOT_KELLY_FRACTION:-0.35}
      BOT_DAILY_LOSS_LIMIT_PCT: ${BOT_DAILY_LOSS_LIMIT_PCT:-10}
    env_file:
      - .env
